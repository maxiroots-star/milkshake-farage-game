<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Milkshake Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🥤 Milkshake Game</h1>

<div id="timer">30</div>
<div id="score">Score: 0</div>

<div id="gameArea">

    <!-- CHARACTER -->
    <img id="character" src="images/character.png">

    <!-- MILKSHAKE -->
    <img id="milkshake" src="images/milkshake.png">

    <!-- SPLASH EFFECT -->
    <img id="splash" src="images/splash.png">

</div>

<h2 id="message">Tap milkshake then tap character (mobile) or drag (desktop)</h2>

<script src="script.js"></script>

</body>
</html>
