<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Milkshake Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="ui">
    <h1>🥤 Milkshake Game</h1>
    <div id="timer">30</div>
    <div id="score">Score: 0</div>
</div>

<div id="gameArea">

    <img id="character" src="images/character.png">
    <img id="milkshake" src="images/milkshake.png">
    <img id="splash" src="images/splash.png">

</div>

<h2 id="message">Tap milkshake then tap character</h2>

<!-- 🎵 MUSIC (MUST BE HERE) -->
<audio id="bgmusic" loop>
    <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
